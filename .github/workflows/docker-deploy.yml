name: Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Docker Container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd terraform-aws-devops-project
            git pull
            cd docker
            docker build -t devops-web .
            docker stop web-server || true
            docker rm web-server || true
            docker run -d -p 80:80 --name web-server devops-web
