apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-web
  template:
    metadata:
      labels:
        app: devops-web
    spec:
      containers:
      - name: devops-web
        image: devops-web:latest
        imagePullPolicy: Never


        ports:
        - containerPort: 80
